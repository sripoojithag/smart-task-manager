<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Register - Smart Task Manager
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    >

    <style>

        body{

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            background:linear-gradient(
                135deg,
                #0f172a,
                #1e293b
            );

            font-family:'Segoe UI', sans-serif;
        }

        .register-card{

            width:100%;

            max-width:420px;

            border:none;

            border-radius:22px;

            padding:35px;

            background:white;

            box-shadow:0 10px 30px rgba(0,0,0,0.15);
        }

        .logo{

            font-size:45px;

            text-align:center;

            color:#2563eb;

            margin-bottom:10px;
        }

        .title{

            text-align:center;

            font-weight:700;

            margin-bottom:30px;
        }

        .form-control{

            height:50px;

            border-radius:12px;
        }

        .btn-register{

            height:50px;

            border-radius:12px;

            font-weight:600;

            font-size:17px;
        }

        .login-link{

            text-align:center;

            margin-top:20px;
        }

        .login-link a{

            text-decoration:none;

            font-weight:600;
        }

    </style>

</head>

<body>

    <div class="register-card">

        <div class="logo">

            <i class="fa-solid fa-rocket"></i>

        </div>

        <h2 class="title">

            Create Account

        </h2>

        {% if error %}

        <div class="alert alert-danger">

            {{ error }}

        </div>

        {% endif %}

        <form method="POST">

            <div class="mb-3">

                <label class="form-label">

                    Username

                </label>

                <input
                    type="text"
                    name="username"
                    class="form-control"
                    required
                >

            </div>

            <div class="mb-4">

                <label class="form-label">

                    Password

                </label>

                <input
                    type="password"
                    name="password"
                    class="form-control"
                    required
                >

            </div>

            <button
                type="submit"
                class="btn btn-primary w-100 btn-register"
            >
                Create Account
            </button>

        </form>

        <div class="login-link">

            <small class="text-muted">

                Already have an account?

            </small>

            <a href="/login">

                Login

            </a>

        </div>

    </div>

</body>

</html>
