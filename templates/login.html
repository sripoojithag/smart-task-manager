<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login - Smart Task Manager</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    >

    <style>

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(
                135deg,
                #0f172a,
                #1e293b
            );
            font-family:'Segoe UI', sans-serif;
        }

        .login-card{
            width:100%;
            max-width:420px;
            border:none;
            border-radius:20px;
            padding:35px;
            background:white;
            box-shadow:0 10px 30px rgba(0,0,0,0.15);
        }

        .logo{
            font-size:45px;
            text-align:center;
            margin-bottom:10px;
            color:#2563eb;
        }

        .title{
            text-align:center;
            font-weight:700;
            margin-bottom:30px;
        }

        .form-control{
            height:50px;
            border-radius:12px;
        }

        .btn-login{
            height:50px;
            border-radius:12px;
            font-weight:600;
            font-size:17px;
        }

        .register-link{
            text-align:center;
            margin-top:20px;
        }

        .register-link a{
            text-decoration:none;
            font-weight:600;
        }

    </style>

</head>

<body>

    <div class="login-card">

        <div class="logo">
            <i class="fa-solid fa-rocket"></i>
        </div>

        <h2 class="title">
            Smart Task Manager
        </h2>

        {% if error %}

        <div class="alert alert-danger">
            {{ error }}
        </div>

        {% endif %}

        <form method="POST">

            <div class="mb-3">

                <label class="form-label">
                    Username
                </label>

                <input
                    type="text"
                    name="username"
                    class="form-control"
                    required
                >

            </div>

            <div class="mb-4">

                <label class="form-label">
                    Password
                </label>

                <input
                    type="password"
                    name="password"
                    class="form-control"
                    required
                >

            </div>

            <button
                type="submit"
                class="btn btn-primary w-100 btn-login"
            >
                Login
            </button>

        </form>

        <div class="register-link">

            <small class="text-muted">
                New user?
            </small>

            <a href="/register">
                Create Account
            </a>

        </div>

    </div>

</body>

</html>
